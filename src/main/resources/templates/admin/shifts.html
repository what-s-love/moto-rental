<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1"><i class="fas fa-clock me-2 text-primary"></i>Смены</h1>
            <p class="text-muted mb-0">Редактируйте смены и их видимость</p>
        </div>
    </div>

    <form th:action="@{/admin/shifts}" method="post">
        <div class="row g-3">
            <div class="col-12" th:each="shift, it : ${shifts}">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <input type="hidden" th:name="'shifts[' + ${it.index} + '].id'" th:value="${shift.id}">

                        <div class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label">Название</label>
                                <input class="form-control" th:name="'shifts[' + ${it.index} + '].name'"
                                       th:value="${shift.name}">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Начало</label>
                                <input class="form-control" th:name="'shifts[' + ${it.index} + '].startTime'"
                                       th:value="${#temporals.format(shift.startTime, 'HH:mm')}">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Окончание</label>
                                <input class="form-control" th:name="'shifts[' + ${it.index} + '].endTime'"
                                       th:value="${#temporals.format(shift.endTime, 'HH:mm')}">
                            </div>

                            <div class="col-md-2">
                                <div class="form-check form-switch">
                                    <!-- Spring checkbox helper - указывает, что поле было в форме -->
                                    <input type="hidden"
                                           th:name="'_shifts[' + ${it.index} + '].enabled'"
                                           value="on">
                                    <input class="form-check-input" type="checkbox"
                                           th:id="'shift-enabled-' + ${shift.id}"
                                           th:name="'shifts[' + ${it.index} + '].enabled'"
                                           th:checked="${shift.enabled}">
                                    <label class="form-check-label" th:for="'shift-enabled-' + ${shift.id}">
                                        Enabled
                                    </label>
                                </div>
                            </div>
                        </div>

                        <small class="text-muted d-block mt-3">
                            ID: <span th:text="${shift.id}">1</span>
                        </small>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-save me-2"></i>Сохранить
            </button>
        </div>
    </form>
</div>
</html>

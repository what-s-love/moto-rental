<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1"><i class="fas fa-chart-line me-2 text-primary"></i>Дашборд</h1>
            <p class="text-muted mb-0">Статистика бронирований</p>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-light">
                    <strong><i class="fas fa-database me-2"></i>Всего (за всё время)</strong>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <div class="p-3 border rounded bg-white">
                                <div class="text-muted small">Всего Booking</div>
                                <div class="h2 mb-0" th:text="${totalBookings}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 border rounded bg-white">
                                <div class="text-muted small">PAID</div>
                                <div class="h2 mb-0" th:text="${paidCount}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 border rounded bg-white">
                                <div class="text-muted small">EXPIRED</div>
                                <div class="h2 mb-0" th:text="${expiredCount}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 border rounded bg-white">
                                <div class="text-muted small">COMPLETED</div>
                                <div class="h2 mb-0" th:text="${completedCount}">0</div>
                            </div>
                        </div>
                    </div>
                    <small class="text-muted d-block mt-3">
                        <i class="fas fa-circle-info me-1"></i>Если нужно — добавьте сюда ещё PAYMENT_FAILED/CANCELLED.
                    </small>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-light">
                    <strong><i class="fas fa-calendar-week me-2"></i>Текущая неделя</strong>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <div class="p-3 border rounded bg-white">
                                <div class="text-muted small">Всего Booking</div>
                                <div class="h2 mb-0" th:text="${weekTotalBookings}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 border rounded bg-white">
                                <div class="text-muted small">PENDING_PAYMENT</div>
                                <div class="h2 mb-0" th:text="${weekPendingPaymentCount}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 border rounded bg-white">
                                <div class="text-muted small">PAID</div>
                                <div class="h2 mb-0" th:text="${weekPaidCount}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 border rounded bg-white">
                                <div class="text-muted small">EXPIRED</div>
                                <div class="h2 mb-0" th:text="${weekExpiredCount}">0</div>
                            </div>
                        </div>
                    </div>
                    <small class="text-muted d-block mt-3">
                        <i class="fas fa-clock me-1"></i>Период “неделя” лучше считать от понедельника до воскресенья.
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
</html>

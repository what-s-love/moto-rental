<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1"><i class="fas fa-chart-line me-2 text-primary"></i><span th:text="#{admin.dashboard.title}">Дашборд</span></h1>
            <p class="text-muted mb-0" th:text="#{admin.dashboard.subtitle}">Статистика бронирований</p>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-light">
                    <strong><i class="fas fa-database me-2"></i><span th:text="#{admin.dashboard.total.all}">Всего (за всё время)</span></strong>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <div class="p-3 rounded">
                                <div class="text-muted small" th:text="#{admin.dashboard.total.bookings}">Всего Booking</div>
                                <div class="h2 mb-0" th:text="${totalBookings}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 rounded">
                                <div class="text-muted small">PAID</div>
                                <div class="h2 mb-0" th:text="${paidCount}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 rounded">
                                <div class="text-muted small">FAILED PAYMENT</div>
                                <div class="h2 mb-0" th:text="${failedCount}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 rounded">
                                <div class="text-muted small">COMPLETED</div>
                                <div class="h2 mb-0" th:text="${completedCount}">0</div>
                            </div>
                        </div>
                    </div>
                    <small class="text-muted d-block mt-3">
                        <i class="fas fa-circle-info me-1"></i><span th:text="#{admin.dashboard.hint.statuses}">Если нужно — добавьте сюда ещё PAYMENT_FAILED/CANCELLED.</span>
                    </small>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-light">
                    <strong><i class="fas fa-calendar-week me-2"></i><span th:text="#{admin.dashboard.current.week}">Текущая неделя</span></strong>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <div class="p-3 rounded">
                                <div class="text-muted small" th:text="#{admin.dashboard.total.bookings}">Всего Booking</div>
                                <div class="h2 mb-0" th:text="${weekTotalBookings}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 rounded">
                                <div class="text-muted small">PENDING PAYMENT</div>
                                <div class="h2 mb-0" th:text="${weekPendingPaymentCount}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 rounded">
                                <div class="text-muted small">PAID</div>
                                <div class="h2 mb-0" th:text="${weekPaidCount}">0</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="p-3 rounded">
                                <div class="text-muted small">FAILED PAYMENT</div>
                                <div class="h2 mb-0" th:text="${weekFailedCount}">0</div>
                            </div>
                        </div>
                    </div>
<!--                    <small class="text-muted d-block mt-3">-->
<!--                        <i class="fas fa-clock me-1"></i><span th:text="#{admin.dashboard.hint.week}">Период "неделя" лучше считать от понедельника до воскресенья.</span>-->
<!--                    </small>-->
                </div>
            </div>
        </div>
    </div>
</div>
</html>

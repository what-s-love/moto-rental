<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1"><i class="fas fa-receipt me-2 text-primary"></i>Бронирования</h1>
            <p class="text-muted mb-0">Все Booking</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/bookings/create}">
            <i class="fas fa-plus me-2"></i>Создать бронирование
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-secondary">
                <tr>
                    <th>ID</th>
                    <th>Дата</th>
                    <th>Смена</th>
                    <th>Сумма</th>
                    <th>Статус</th>
                    <th class="text-end">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="booking : ${bookings}">
                    <td class="fw-semibold" th:text="${booking.id}">X</td>
                    <td th:text="${#temporals.format(booking.rideDate, 'dd.MM.yyyy')}">dd.MM.yyyy</td>
                    <td th:text="${booking.shiftName}">XXX</td>
                    <td>
                        <span th:text="${booking.totalPrice}">0</span> ₽
                    </td>
                    <td>
                        <span class="badge bg-secondary" th:text="${booking.bookingStatus.displayName}">XXX</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/admin/bookings/{id}/edit(id=${booking.id})}">
                            <i class="fas fa-pen me-1"></i>Редактировать
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="fas fa-inbox me-2"></i>Пока нет бронирований
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>

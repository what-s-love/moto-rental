<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1"><i class="fas fa-receipt me-2 text-primary"></i><span th:text="#{admin.bookings.title}">Бронирования</span></h1>
            <p class="text-muted mb-0" th:text="#{admin.bookings.all}">Все Booking</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/bookings/create}">
            <i class="fas fa-plus me-2"></i><span th:text="#{admin.bookings.create}">Создать бронирование</span>
        </a>
    </div>

    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}">Успешно</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-triangle-exclamation me-2"></i><span th:text="${error}">Ошибка</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-secondary">
                <tr>
                    <th>ID</th>
                    <th th:text="#{admin.label.date}">Дата</th>
                    <th th:text="#{admin.label.shift}">Смена</th>
                    <th th:text="#{admin.label.participants.short}">Кол.уч.</th>
                    <th th:text="#{admin.label.amount}">Сумма</th>
                    <th th:text="#{admin.label.status}">Статус</th>
                    <th class="text-end" th:text="#{admin.label.actions}">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="booking : ${bookings}">
                    <td class="fw-semibold" th:text="${booking.id}">X</td>
                    <td th:text="${#temporals.format(booking.rideDate, 'dd.MM.yyyy')}">dd.MM.yyyy</td>
                    <td th:text="${booking.shiftName}">XXX</td>
                    <td class="text-center" th:text="${booking.participants.size()}">XXX</td>
                    <td>
                        <span th:text="${booking.totalPrice}">0</span> ₽
                    </td>
                    <td>
                        <span class="badge bg-secondary" th:text="${booking.bookingStatus.displayName}">XXX</span>
                    </td>
                    <td class="text-end">
                        <!-- Копировать ссылку на оплату — только для PENDING_PAYMENT -->
                        <button th:if="${booking.bookingStatus.name() == 'PENDING_PAYMENT' and booking.paymentLink != null}"
                                class="btn btn-outline-secondary btn-sm me-1"
                                th:data-url="${booking.paymentLink}"
                                onclick="navigator.clipboard.writeText(this.dataset.url)"
                                title="Скопировать ссылку на оплату">
                            <i class="fas fa-copy"></i>
                        </button>
                        <!-- Перевыпустить ссылку — только для PENDING_PAYMENT -->
                        <form th:if="${booking.bookingStatus.name() == 'PENDING_PAYMENT'}"
                              th:action="@{/admin/bookings/{id}/regenerate-payment(id=${booking.id})}"
                              method="post"
                              style="display:inline"
                              onsubmit="return confirm('Перевыпустить ссылку на оплату для бронирования #' + [[${booking.id}]] + '?')">
                            <button type="submit"
                                    class="btn btn-outline-warning btn-sm me-1"
                                    title="Перевыпустить ссылку на оплату">
                                <i class="fas fa-rotate-right"></i>
                            </button>
                        </form>
                        <!-- Редактировать бронирование -->
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/admin/bookings/{id}/edit(id=${booking.id})}">
                            <i class="fas fa-pen me-1"></i><span th:text="#{admin.button.edit}">Редактировать</span>
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="fas fa-inbox me-2"></i><span th:text="#{admin.empty.bookings}">Пока нет бронирований</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <nav th:if="${totalPages > 1}" class="mt-3 d-flex justify-content-center">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/bookings(page=${currentPage - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/bookings(page=${i})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/bookings(page=${currentPage + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</html>

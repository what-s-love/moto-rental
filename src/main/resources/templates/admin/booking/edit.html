<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="mb-4">
        <h1 class="h3 mb-1">
            <i class="fas fa-pen-to-square me-2 text-primary"></i><span th:text="|#{admin.button.read} #{admin.bookings.title}|">Редактировать бронирование</span>
        </h1>
        <p class="text-muted mb-0">ID: <span th:text="${booking.id}">1</span></p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/admin/bookings/{id}(id=${booking.id})}" method="post" class="vstack gap-3">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label" th:text="#{admin.label.date}">Дата</label>
                        <input class="form-control" th:value="${#temporals.format(booking.rideDate, 'dd.MM.yyyy')}" readonly>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" th:text="#{admin.label.shift}">Смена</label>
                        <input class="form-control" th:value="${booking.shiftName}" readonly>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" th:text="#{admin.label.amount}">Сумма</label>
                        <input class="form-control" th:value="${booking.totalPrice}" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{admin.label.status}">Статус</label>
                        <select class="form-select" name="bookingStatus" required>
                            <option th:value="${booking.bookingStatus}" th:text="${booking.bookingStatus.displayName}" selected>Текущий</option>
                            <option th:each="s : ${T(ge.tsepesh.motorental.enums.BookingStatus).values()}"
                                    th:value="${s}"
                                    th:text="${s.displayName}"
                                    th:selected="${s == booking.bookingStatus}">Статус</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-save me-2"></i><span th:text="#{admin.button.save}">Сохранить</span>
                    </button>
                </div>

                <a class="btn btn-outline-secondary" th:href="@{/admin/bookings}">
                    <i class="fas fa-arrow-left me-2"></i><span th:text="#{admin.button.back}">Назад к списку</span>
                </a>
            </form>
        </div>
    </div>
</div>
</html>

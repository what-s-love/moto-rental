<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">

<div layout:fragment="content">
    <div class="mb-4">
        <h1 class="h3 mb-1">
            <i class="fas fa-plus-circle me-2 text-primary"></i><span th:text="#{admin.bookings.create}">Создать бронирование</span>
        </h1>
        <p class="text-muted mb-0" th:text="#{admin.bookings.create.subtitle}">Быстрая форма для администратора</p>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}">Успешно</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-triangle-exclamation me-2"></i><span th:text="${error}">Ошибка</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form id="adminCreateBookingForm" th:action="@{/admin/bookings}" method="post">
                <div class="my-4">
                    <h2 class="h5 mb-3">
                        <i class="fas fa-user me-2"></i>
                        <span th:text="#{booking.client.title}">Контактное лицо</span>
                    </h2>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">
                                <span th:text="#{booking.client.name}">Имя и Фамилия</span> <span class="text-danger" th:text="#{form.required}">*</span>
                            </label>
                            <input type="text"
                                   class="form-control"
                                   name="client.name"
                                   required
                                   maxlength="255"
                                   th:placeholder="#{placeholder.client.name}"
                                   placeholder="Иван Иванов">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                <span th:text="#{booking.client.email}">Email</span> <span class="text-danger" th:text="#{form.required}">*</span>
                            </label>
                            <input type="email"
                                   class="form-control"
                                   name="client.email"
                                   required
                                   maxlength="255"
                                   th:placeholder="#{placeholder.client.email}"
                                   placeholder="ivan@example.com">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" th:text="#{booking.client.phone}">
                                Телефон
                            </label>
                            <input type="tel"
                                   class="form-control"
                                   name="client.phone"
                                   pattern="^\+?[0-9]{9,15}$"
                                   th:placeholder="#{placeholder.client.phone}"
                                   placeholder="+79161234567">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" th:text="#{booking.client.telegram}">
                                Telegram ID
                            </label>
                            <input type="text"
                                   class="form-control"
                                   name="client.telegramId"
                                   maxlength="100"
                                   th:placeholder="#{placeholder.client.telegram}"
                                   placeholder="@username">
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="date" class="form-label" th:text="#{booking.date.label}">Дата заезда</label>
                        <input type="date"
                               class="form-control"
                               id="date"
                               name="date"
                               required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" th:text="#{admin.label.shift}">Смена</label>
                        <select class="form-select" name="shiftId" required>
                            <option value="" selected disabled th:text="#{admin.select.shift}">Выберите смену</option>
                            <option th:each="s : ${shifts}"
                                    th:value="${s.id}"
                                    th:text="${s.name + ' (' + #temporals.format(s.startTime,'HH:mm') + '-' + #temporals.format(s.endTime,'HH:mm') + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" th:text="#{admin.label.route}">Маршрут</label>
                        <select class="form-select" name="routeId" required>
                            <option value="" selected disabled th:text="#{admin.select.route}">Выберите маршрут</option>
                            <option th:each="r : ${routes}"
                                    th:value="${r.id}"
                                    th:text="${r.name + ' · ' + r.price + ' ₽/чел'}">
                            </option>
                        </select>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h2 class="h5 mb-0">
                        <i class="fas fa-users me-2"></i><span th:text="#{admin.participants.title}">Участники</span>
                    </h2>
                    <button type="button"
                            class="btn btn-outline-primary btn-sm"
                            id="addParticipantBtn">
                        <i class="fas fa-user-plus me-1"></i><span th:text="#{booking.participant.add}">Добавить</span>
                    </button>
                </div>

                <div id="participantsContainer" class="vstack gap-3"></div>

                <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" id="paidCheckbox" name="paid">
                    <label class="form-check-label" for="paidCheckbox">
                        PAID
                    </label>
                </div>

                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-check me-2"></i><span th:text="#{admin.button.create}">Создать</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript" defer>
        const availableBikes = /*[[${availableBikes}]]*/ [];
        const maxParticipants = /*[[${maxParticipants}]]*/ 8;

        const i18n = {
            selectBike: /*[[#{admin.select.bike}]]*/ 'Выберите мотоцикл',
            bikeOccupied: /*[[#{booking.occupied}]]*/ 'занят',
            participant: /*[[#{booking.participant.number}]]*/ 'Участник',
            gender: /*[[#{booking.participant.gender}]]*/ 'Пол',
            genderSelect: /*[[#{booking.participant.gender.select}]]*/ 'Выберите',
            genderMale: /*[[#{booking.participant.gender.male}]]*/ 'Мужской',
            genderFemale: /*[[#{booking.participant.gender.female}]]*/ 'Женский',
            age: /*[[#{booking.participant.age}]]*/ 'Возраст',
            height: /*[[#{booking.participant.height}]]*/ 'Рост (см)',
            experience: /*[[#{booking.participant.experience}]]*/ 'Опыт',
            experienceSelect: /*[[#{booking.participant.experience.select}]]*/ 'Выберите',
            experienceNone: /*[[#{booking.participant.experience.none}]]*/ 'NONE',
            experienceBeginner: /*[[#{booking.participant.experience.beginner}]]*/ 'BEGINNER',
            experienceIntermediate: /*[[#{booking.participant.experience.intermediate}]]*/ 'INTERMEDIATE',
            experienceAdvanced: /*[[#{booking.participant.experience.advanced}]]*/ 'ADVANCED',
            bike: /*[[#{admin.label.bike}]]*/ 'Мотоцикл',
            choose: /*[[#{admin.select.choose}]]*/ 'Выберите',
            placeholderAge: /*[[#{placeholder.age}]]*/ '18',
            placeholderHeight: /*[[#{placeholder.height}]]*/ '180'
        };

        function participantLabel(index) {
            return i18n.participant + ' #' + (index + 1);
        }

        function getSelectedBikes() {
            const selects = document.querySelectorAll('#participantsContainer select[name$=".bikeId"]');
            return Array.from(selects)
                .map(s => s.value)
                .filter(v => v !== '');
        }

        function updateBikeSelects() {
            const selectedBikes = getSelectedBikes();
            const selects = document.querySelectorAll('#participantsContainer select[name$=".bikeId"]');

            selects.forEach(select => {
                const currentValue = select.value;
                select.innerHTML = `<option value="" selected disabled>${i18n.selectBike}</option>`;

                availableBikes.forEach(bike => {
                    const label = `${bike.brand} ${bike.model} · ${bike.engineCc}cc`;
                    const option = document.createElement('option');
                    option.value = bike.id;
                    option.textContent = label;

                    if (selectedBikes.includes(String(bike.id)) && String(bike.id) !== currentValue) {
                        option.disabled = true;
                        option.textContent = label + ' (' + i18n.bikeOccupied + ')';
                    }

                    select.appendChild(option);
                });

                if (currentValue) {
                    select.value = currentValue;
                }
            });
        }

        function participantBlockHtml(i) {
            return `
            <div class="card bg-light border" data-participant-index="${i}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <strong>${participantLabel(i)}</strong>
                        <button type="button"
                                class="btn btn-outline-danger btn-sm"
                                onclick="removeParticipant(event)">
                            <i class="fas fa-xmark"></i>
                        </button>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">${i18n.gender}</label>
                            <select class="form-select" name="participants[${i}].gender" required>
                                <option value="" selected disabled>${i18n.genderSelect}</option>
                                <option value="MALE">${i18n.genderMale}</option>
                                <option value="FEMALE">${i18n.genderFemale}</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">${i18n.age}</label>
                            <input class="form-control" type="number"
                                   name="participants[${i}].age"
                                   min="12" max="99"
                                   placeholder="${i18n.placeholderAge}"
                                   required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">${i18n.height}</label>
                            <input class="form-control" type="number"
                                   name="participants[${i}].height"
                                   min="130" max="220"
                                   placeholder="${i18n.placeholderHeight}"
                                   required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">${i18n.experience}</label>
                            <select class="form-select"
                                    name="participants[${i}].experienceLevel"
                                    required>
                                <option value="" selected disabled>${i18n.experienceSelect}</option>
                                <option value="NONE">${i18n.experienceNone}</option>
                                <option value="BEGINNER">${i18n.experienceBeginner}</option>
                                <option value="INTERMEDIATE">${i18n.experienceIntermediate}</option>
                                <option value="ADVANCED">${i18n.experienceAdvanced}</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">${i18n.bike}</label>
                            <select class="form-select bike-select"
                                    name="participants[${i}].bikeId"
                                    required>
                                <option value="" selected disabled>${i18n.selectBike}</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function addParticipant() {
            const count = document.querySelectorAll('#participantsContainer .card').length;
            if (count >= maxParticipants) return;

            const container = document.getElementById('participantsContainer');
            container.insertAdjacentHTML('beforeend', participantBlockHtml(count));

            updateBikeSelects();

            const newCard = container.lastElementChild;
            const bikeSelect = newCard.querySelector('.bike-select');
            if (bikeSelect) {
                bikeSelect.addEventListener('change', updateBikeSelects);
            }
        }

        function removeParticipant(event) {
            const btn = event.target.closest('button');
            const card = btn.closest('.card');
            if (card) {
                card.remove();
                reindexParticipants();
                updateBikeSelects();
            }
        }

        function reindexParticipants() {
            const cards = document.querySelectorAll('#participantsContainer .card');

            cards.forEach((card, newIndex) => {
                card.setAttribute('data-participant-index', newIndex);

                const header = card.querySelector('strong');
                if (header) {
                    header.textContent = participantLabel(newIndex);
                }

                const inputs = card.querySelectorAll('input, select');
                inputs.forEach(input => {
                    const name = input.getAttribute('name');
                    if (name && name.startsWith('participants[')) {
                        const newName = name.replace(/participants\[\d+\]/, `participants[${newIndex}]`);
                        input.setAttribute('name', newName);
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            const addBtn = document.getElementById('addParticipantBtn');

            if (addBtn) {
                addBtn.addEventListener('click', addParticipant);
            }

            addParticipant();
        });
    </script>
</div>
</html>

<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1"><i class="fas fa-file-shield me-2 text-primary"></i>Политики</h1>
            <p class="text-muted mb-0">История версий политики обработки ПДн</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/policies/create}">
            <i class="fas fa-plus me-2"></i>Добавить политику
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-secondary">
                <tr>
                    <th>ID</th>
                    <th>Дата создания</th>
                    <th>Версия</th>
                    <th>Статус</th>
                    <th class="text-end">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${policies}">
                    <td class="fw-semibold" th:text="${p.id}">1</td>
                    <td th:text="${#temporals.format(p.createdAt, 'dd.MM.yyyy HH:mm')}">dd.MM.yyyy HH:mm</td>
                    <td th:text="${p.version}">X.X</td>
                    <td th:classappend="${p.isActive} ? 'text-success' : 'text-danger'"
                            th:text="${p.isActive} ? 'АКТИВНО' : 'УСТАРЕЛО'">СТАТУС</td>
                    <td class="text-end">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/policies/{id}(id=${p.id})}" target="_blank" rel="noopener">
                            <i class="fas fa-book-open me-1"></i>Читать
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(policies)}">
                    <td colspan="4" class="text-center py-5 text-muted">
                        <i class="fas fa-inbox me-2"></i>Политики ещё не добавлены
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>

<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="mb-4">
        <h1 class="h3 mb-1"><i class="fas fa-plus-circle me-2 text-primary"></i>Создать маршрут</h1>
        <p class="text-muted mb-0">Добавление нового маршрута</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/admin/routes}" method="post" enctype="multipart/form-data" class="vstack gap-3">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label" for="name">Название <span class="text-danger">*</span></label>
                        <input class="form-control" id="name" name="name" type="text" maxlength="255" required
                               placeholder="Миражи на виражах">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="distance">Дистанция (км) <span class="text-danger">*</span></label>
                        <input class="form-control" id="distance" name="distance" type="number" min="1" required
                               placeholder="15">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="duration">Длительность (мин) <span class="text-danger">*</span></label>
                        <input class="form-control" id="duration" name="duration" type="number" min="1" required
                               placeholder="90">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="difficulty">Сложность <span class="text-danger">*</span></label>
                        <select class="form-select" id="difficulty" name="difficulty" required>
                            <option value="" selected disabled>Выберите</option>
                            <option th:each="d : ${difficulties}" th:value="${d.value}" th:text="${d.displayName}">Легкий</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="price">Цена (₽) <span class="text-danger">*</span></label>
                        <input class="form-control" id="price" name="price" type="number" step="0.01" min="0" required
                               placeholder="1500">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="weekendPrice">Цена выходной (₽) <span class="text-danger">*</span></label>
                        <input class="form-control" id="weekendPrice" name="weekendPrice" type="number" step="0.01" min="0" required
                               placeholder="2500">
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="description">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="3" maxlength="1000"
                                  placeholder="Описание маршрута..."></textarea>
                        <small class="text-muted">Максимум 1000 символов</small>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="mapImage">Изображение карты маршрута</label>
                        <input class="form-control" id="mapImage" name="mapImage" type="file" accept="image/*">
                        <small class="text-muted">
                            <i class="fas fa-circle-info me-1"></i>Загрузите изображение карты маршрута (PNG, JPG).
                            Если не загружено, будет использовано изображение по умолчанию.
                        </small>
                    </div>

                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="isSpecial" name="isSpecial">
                            <label class="form-check-label" for="isSpecial">
                                Специальный маршрут
                            </label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="enabled" name="enabled" checked>
                            <label class="form-check-label" for="enabled">
                                Enabled (активен)
                            </label>
                        </div>
                    </div>
                </div>

                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-save me-2"></i>Создать
                    </button>
                </div>

                <a class="btn btn-outline-secondary" th:href="@{/admin/routes}">
                    <i class="fas fa-arrow-left me-2"></i>Назад к списку
                </a>
            </form>
        </div>
    </div>
</div>
</html>

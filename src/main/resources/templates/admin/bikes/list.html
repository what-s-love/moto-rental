<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1"><i class="fas fa-motorcycle me-2 text-primary"></i><span th:text="#{admin.nav.bikes}">Мотоциклы</span></h1>
            <p class="text-muted mb-0" th:text="#{admin.bikes.all}">Все мотоциклы</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/bikes/create}">
            <i class="fas fa-plus me-2"></i><span th:text="#{admin.bikes.add}">Добавить мотоцикл</span>
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}">Успешно</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-triangle-exclamation me-2"></i><span th:text="${error}">Ошибка</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">
        <div class="col-12 col-md-6 col-xl-4" th:each="bike : ${bikes}">
            <div class="card bike-card shadow-sm h-100 overflow-hidden">
                <div class="position-relative" style="height: 200px; background: white;">
                    <img th:if="${bike.photoPath != null}"
                         th:src="@{${bike.photoPath}}"
                         alt="Bike"
                         class="w-100 h-100"
                         style="object-fit: cover;">
                    <div th:unless="${bike.photoPath != null}"
                         class="d-flex align-items-center justify-content-center w-100 h-100 text-white">
                        <i class="fas fa-motorcycle fa-4x opacity-75"></i>
                    </div>
                </div>
                <div class="card-body d-flex flex-column flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0" th:text="${bike.brand + ' ' + bike.model}">Brand Model</h5>
                        <span class="badge bg-dark">
                            <span th:text="${bike.engineCc}">250</span> <span th:text="#{bike.cc}">см³</span>
                        </span>
                    </div>
                    <div class="mt-auto">
                        <p class="text-muted small mb-2">
                            <i class="fas fa-gears me-1"></i>
                            <span th:text="#{${bike.transmissionType}}">механика</span>
                        </p>
                        <p class="small mb-2" th:if="${bike.limits != null}">
                            <i class="fas fa-ruler-vertical me-1 text-primary"></i>
                            <span th:text="${bike.limits.heightMin}">160</span>–<span th:text="${bike.limits.heightMax}">190</span> см,
                            <span th:text="#{booking.bike.years.from(${bike.limits.ageMin})}">от 18 лет</span>
                            <span th:if="${bike.limits.onlyMen}" class="badge bg-primary ms-1">
                                <i class="fas fa-mars"></i>
                            </span>
                        </p>
                    </div>
                </div>
                <div class="mx-2 mb-2 d-flex flex-wrap gap-1 align-items-center">
                    <span class="badge bg-secondary">ID: <span th:text="${bike.id}">1</span></span>
                    <span class="badge" th:classappend="${bike.enabled} ? 'bg-success' : 'bg-secondary'">
                        <i class="fas" th:classappend="${bike.enabled} ? 'fa-circle-check' : 'fa-circle-xmark'"></i>
                        <span th:text="${bike.enabled} ? #{admin.enabled} : #{admin.disabled}">Активен</span>
                    </span>
                </div>
                <div class="d-grid mx-2 mb-3">
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/bikes/{id}/edit(id=${bike.id})}">
                        <i class="fas fa-pen me-1"></i><span th:text="#{admin.button.read}">Редактировать</span>
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(bikes)}" class="col-12">
            <div class="card shadow-sm">
                <div class="card-body text-center py-5 text-muted">
                    <i class="fas fa-inbox fa-3x mb-3"></i>
                    <p class="mb-0" th:text="#{admin.empty.bikes}">Пока нет мотоциклов</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .bike-card {
            transition: all 0.3s ease;
        }
        .bike-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important;
        }
    </style>
</div>
</html>

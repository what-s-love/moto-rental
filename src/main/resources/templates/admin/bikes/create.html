<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/base}">
<div layout:fragment="content">
    <div class="mb-4">
        <h1 class="h3 mb-1"><i class="fas fa-plus-circle me-2 text-primary"></i><span th:text="#{admin.bikes.add}">Добавить мотоцикл</span></h1>
        <p class="text-muted mb-0" th:text="#{admin.bikes.add.subtitle}">Новый мотоцикл в парке</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/admin/bikes}" method="post" enctype="multipart/form-data" class="vstack gap-3">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="brand"><span th:text="#{admin.label.brand}">Марка</span> <span class="text-danger" th:text="#{form.required}">*</span></label>
                        <input class="form-control" id="brand" name="brand" type="text" maxlength="100" required
                               th:placeholder="#{admin.hint.bike.brand}" placeholder="Regulmoto">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="model"><span th:text="#{admin.label.model}">Модель</span> <span class="text-danger" th:text="#{form.required}">*</span></label>
                        <input class="form-control" id="model" name="model" type="text" maxlength="100" required
                               th:placeholder="#{admin.hint.bike.model}" placeholder="Sport-003 Z">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="engineCc"><span th:text="#{admin.label.engine.cc}">Объём (см³)</span> <span class="text-danger" th:text="#{form.required}">*</span></label>
                        <input class="form-control" id="engineCc" name="engineCc" type="number" min="1" max="5000" required
                               th:placeholder="#{admin.hint.bike.cc}" placeholder="250">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="transmissionType"><span th:text="#{admin.label.transmission}">Трансмиссия</span> <span class="text-danger" th:text="#{form.required}">*</span></label>
                        <select class="form-select" id="transmissionType" name="transmissionType" required>
                            <option value="" selected disabled th:text="#{admin.select.choose}">Выберите</option>
                            <option th:each="t : ${transmissionTypes}"
                                    th:value="${t.value}"
                                    th:text="#{${t.displayName}}">механика</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="limitId"><span th:text="#{admin.label.limit.height.age}">Ограничение (рост / возраст)</span> <span class="text-danger" th:text="#{form.required}">*</span></label>
                        <select class="form-select" id="limitId" name="limitId" required>
                            <option value="" selected disabled th:text="#{admin.select.choose}">Выберите</option>
                            <option th:each="lim : ${limits}" th:value="${lim.id}"
                                    th:text="|№${lim.id}: ${lim.heightMin}–${lim.heightMax} см, ${#messages.msg('booking.bike.years.from', lim.ageMin)}${lim.onlyMen ? ' (' + #messages.msg('admin.limit.only.men.short') + ')' : ''}|">
                            </option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="bikePhoto" th:text="#{admin.label.photo}">Фото</label>
                        <input class="form-control" id="bikePhoto" name="bikePhoto" type="file" accept="image/*">
                        <small class="text-muted" th:text="#{admin.photo.optional}">Необязательно — на карточке будет значок по умолчанию</small>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="enabled" name="enabled" checked>
                            <label class="form-check-label" for="enabled" th:text="#{admin.enabled.booking}">Активен (доступен для брони)</label>
                        </div>
                    </div>
                </div>
                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-save me-2"></i><span th:text="#{admin.button.create}">Создать</span>
                    </button>
                </div>
                <a class="btn btn-outline-secondary" th:href="@{/admin/bikes}">
                    <i class="fas fa-arrow-left me-2"></i><span th:text="#{admin.button.back}">Назад к списку</span>
                </a>
            </form>
        </div>
    </div>
</div>
</html>

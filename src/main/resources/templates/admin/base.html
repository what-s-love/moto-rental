<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' · ' + #messages.msg('app.name') : #messages.msg('app.name')}">Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <style>
        .admin-layout { flex: 1; }
        .admin-sidebar-wrap { width: 280px; }
        @media (max-width: 992px) {
            .admin-sidebar-wrap { width: 100%; }
        }
    </style>
</head>

<body data-bs-theme="light">
<div th:replace="~{common/header :: header}"></div>

<main class="admin-layout">
    <div class="container py-4">
        <div class="row g-4">
            <div class="col-12 col-lg-auto admin-sidebar-wrap">
                <div class="card-body p-0">
                    <div th:replace="~{common/admin-sidebar}"></div>
                </div>
            </div>

            <div class="col">
                <div layout:fragment="content"></div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{common/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/theme-switcher.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

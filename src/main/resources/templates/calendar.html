<!DOCTYPE html>
<html layout:decorate="~{common/base}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<div layout:fragment="content">
    <div class="container py-5">
        <div class="row">
            <div class="col-12">
                <!-- Header -->
                <div class="mb-4">
                    <h1 class="h2 text-center mb-2" th:text="#{calendar.title}">Календарь заездов</h1>
                    <p class="h5 text-center" th:text="#{calendar.info1}">Создайте свой заезд или присоединяйтесь к существующему!</p>
                    <p class="h5 text-center" th:text="#{calendar.info2}">Выберите дату и смену заезда</p>
                </div>

                <!-- Error Badge -->
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show text-center pe-3" role="alert">
                    <i class="fas fa-triangle-exclamation me-2"></i><span th:text="${error}">Ошибка</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Calendar Container -->
                <div id="calendar"></div>
            </div>
        </div>
    </div>

    <!-- Modal для выбора смены -->
    <div class="modal fade" id="shiftModal" tabindex="-1" aria-labelledby="shiftModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="shiftModalLabel">
                        <i class="fas fa-calendar-day me-2"></i>
                        <span th:text="#{calendar.shift.select}">Выберите смену</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" th:aria-label="#{aria.close}" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-3" id="selectedDate"></p>
                    <div id="shiftsContainer" class="d-grid gap-2">
                        <!-- Shifts will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal с информацией о заезде -->
    <div class="modal fade" id="rideModal" tabindex="-1" aria-labelledby="rideModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable ride-modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="rideModalLabel">
                        <i class="fas fa-motorcycle me-2"></i>
                        <span th:text="#{calendar.ride.details}">Информация о заезде</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" th:aria-label="#{aria.close}" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-unstyled ride-details-list mb-0">
                        <li class="ride-detail-item">
                            <span class="ride-detail-label" th:text="#{calendar.shift.label}">Смена:</span>
                            <span class="ride-detail-value" id="rideModalShift"></span>
                        </li>
                        <li class="ride-detail-item">
                            <span class="ride-detail-label" th:text="#{calendar.time.label}">Время:</span>
                            <span class="ride-detail-value" id="rideModalTime"></span>
                        </li>
                        <li class="ride-detail-item">
                            <span class="ride-detail-label" th:text="#{calendar.participants.label}">Участников:</span>
                            <span class="ride-detail-value" id="rideModalParticipants"></span>
                        </li>
                        <li class="ride-detail-item">
                            <span class="ride-detail-label" th:text="#{calendar.available.label}">Свободно мест:</span>
                            <span class="ride-detail-value" id="rideModalAvailable"></span>
                        </li>
                        <li class="ride-detail-item">
                            <span class="ride-detail-label" th:text="#{calendar.route.label}">Маршрут:</span>
                            <span class="ride-detail-value" id="rideModalRoute"></span>
                        </li>
                        <li class="ride-detail-item">
                            <span class="ride-detail-label" th:text="#{calendar.status.label}">Статус:</span>
                            <span class="ride-detail-value" id="rideModalStatus"></span>
                        </li>
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary w-100 w-sm-auto" data-bs-dismiss="modal" th:text="#{button.close}">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FullCalendar CSS and JS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/locales/ru.js"></script>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const ridesData = /*[[${rides}]]*/ [];
            const allShifts = /*[[${shifts}]]*/ [];
            const i18n = {
                peopleShort: /*[[#{calendar.people.short}]]*/ 'чел.',
                today: /*[[#{calendar.today}]]*/ 'Сегодня',
                month: /*[[#{calendar.month}]]*/ 'Месяц',
                list: /*[[#{calendar.list}]]*/ 'Список',
                shift: /*[[#{calendar.shift.label}]]*/ 'Смена:',
                time: /*[[#{calendar.time.label}]]*/ 'Время:',
                participants: /*[[#{calendar.participants.label}]]*/ 'Участников:',
                available: /*[[#{calendar.available.label}]]*/ 'Свободно мест:',
                route: /*[[#{calendar.route.label}]]*/ 'Маршрут:',
                routeNotSpecified: /*[[#{calendar.route.not.specified}]]*/ 'не указан',
                statusFull: /*[[#{calendar.status.full}]]*/ 'Полностью забронирован',
                statusAvailable: /*[[#{calendar.status.available}]]*/ 'Есть свободные места',
                availableShort: /*[[#{calendar.available.short}]]*/ 'свободно',
                status: /*[[#{calendar.status.label}]]*/ 'Статус:',
                noSpots: /*[[#{calendar.no.spots}]]*/ 'Нет свободных мест'
            };

            console.log('Rides data:', ridesData);
            console.log('All shifts:', allShifts);
            console.log('Rides count:', ridesData.length);
            console.log('Shifts count:', allShifts.length);

            const events = ridesData.map(ride => ({
                id: 'ride-' + ride.rideId,
                title: `${ride.startTime.substring(0, 5)}-${ride.endTime.substring(0, 5)} | ${ride.participantCount} ${i18n.peopleShort}`,
                start: ride.date,
                allDay: true,
                backgroundColor: ride.isFull ? '#0059ff' : '#22bbff',
                borderColor: ride.isFull ? '#0059ff' : '#22bbff',
                extendedProps: {
                    rideId: ride.rideId,
                    shiftId: ride.shiftId,
                    shiftName: ride.shiftName,
                    participantCount: ride.participantCount,
                    availableBikes: ride.availableBikes,
                    totalBikes: ride.totalBikes,
                    routeName: ride.routeName,
                    routeDescription: ride.routeDescription,
                    isFull: ride.isFull,
                    startTime: ride.startTime.substring(0, 5),
                    endTime: ride.endTime.substring(0, 5)
                }
            }));

            const calendar = new FullCalendar.Calendar(calendarEl, {
                themeSystem: 'bootstrap5',
                initialView: 'dayGridMonth',
                locale: 'ru',
                firstDay: 1,
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listWeek'
                },
                buttonText: {
                    today: i18n.today,
                    month: i18n.month,
                    list: i18n.list
                },
                height: 'auto',
                events: events,
                eventContent: function(arg) {
                    const props = arg.event.extendedProps;
                    return {
                        html: `
                            <div class="fc-event-main-frame">
                                <div class="fc-event-title-container">
                                    <div class="fc-event-title fc-sticky d-flex justify-content-between">
                                        <div>
                                            <i class="fas fa-clock me-1"></i>
                                            ${props.startTime}-${props.endTime}
                                        </div>
                                        <div>
                                            ${props.participantCount} <i class="fas fa-users me-1"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `
                    };
                },
                eventClick: function(info) {
                    showRideModal(info.event.extendedProps);
                },
                dateClick: function(info) {
                    showShiftModal(info.dateStr);
                }
            });

            calendar.render();

            function showRideModal(props) {
                document.getElementById('rideModalShift').textContent = props.shiftName;
                document.getElementById('rideModalTime').textContent = `${props.startTime} - ${props.endTime}`;
                document.getElementById('rideModalParticipants').textContent = props.participantCount;

                const availableEl = document.getElementById('rideModalAvailable');
                availableEl.textContent = props.availableBikes;
                availableEl.classList.toggle('text-danger', props.availableBikes === 0);
                availableEl.classList.toggle('fw-semibold', props.availableBikes === 0);

                const routeDescription = props.routeDescription || i18n.routeNotSpecified;
                document.getElementById('rideModalRoute').textContent = `${props.routeName}: ${routeDescription}`;

                const statusEl = document.getElementById('rideModalStatus');
                statusEl.textContent = props.isFull ? i18n.statusFull : i18n.statusAvailable;
                statusEl.classList.remove('text-danger', 'text-success', 'fw-semibold');
                if (props.isFull) {
                    statusEl.classList.add('text-danger', 'fw-semibold');
                } else {
                    statusEl.classList.add('text-success');
                }

                bootstrap.Modal.getOrCreateInstance(document.getElementById('rideModal')).show();
            }

            function showShiftModal(dateStr) {
                const date = new Date(dateStr + 'T00:00:00');
                const formattedDate = date.toLocaleDateString('ru-RU', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                document.getElementById('selectedDate').textContent = formattedDate;

                // Находим заезды для выбранной даты
                const ridesForDate = ridesData.filter(ride => ride.date === dateStr);

                const shiftsContainer = document.getElementById('shiftsContainer');
                shiftsContainer.innerHTML = '';

                allShifts.forEach(shift => {
                    // Проверяем, есть ли заезд для этой смены
                    const ride = ridesForDate.find(r => r.shiftId === shift.id);

                    const button = document.createElement('button');
                    button.className = 'btn btn-outline-primary shift-button';

                    if (ride) {
                        // Есть заезд - показываем информацию
                        const isFull = ride.isFull;
                        button.className = isFull ? 'btn btn-success' : 'btn btn-primary';

                        button.innerHTML = `
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="text-start">
                                    <strong>${shift.name}</strong><br>
                                    <small><i class="fas fa-clock me-1"></i>${shift.startTime} - ${shift.endTime}</small>
                                </div>
                                <div class="text-end">
                                    <span class="badge bg-custom-primary">
                                        <i class="fas fa-users me-1"></i>${ride.participantCount} ${i18n.peopleShort}
                                    </span><br>
                                    <small>${ride.availableBikes} ${i18n.availableShort}</small>
                                </div>
                            </div>
                        `;

                        if (isFull) {
                            button.disabled = true;
                            button.innerHTML += `<div class="mt-1"><small>${i18n.noSpots}</small></div>`;
                        }
                    } else {
                        // Нет заезда - показываем только смену
                        button.innerHTML = `
                            <div class="text-start">
                                <strong>${shift.name}</strong><br>
                                <small><i class="fas fa-clock me-1"></i>${shift.startTime} - ${shift.endTime}</small>
                            </div>
                        `;
                    }

                    button.onclick = function() {
                        if (!button.disabled) {
                            window.location.href = `/ride?date=${dateStr}&shiftId=${shift.id}`;
                        }
                    };

                    shiftsContainer.appendChild(button);
                });

                const modal = new bootstrap.Modal(document.getElementById('shiftModal'));
                modal.show();
            }
        });
    </script>
</div>

</html>

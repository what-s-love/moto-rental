server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:moto_rental_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  liquibase:
    change-log: classpath:db/changelog/master.yaml
    enabled: true
    default-schema: public
  # H2 Console (опционально, для отладки)
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:email@example.com}
    password: ${MAIL_PASSWORD:https://myaccount.google.com/apppasswords}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${MAIL_SSL_ENABLE:false}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
          from: ${MAIL_USERNAME:email@example.com}

yookassa:
  shop-id: ${YOOKASSA_SHOP_ID}
  secret-key: ${YOOKASSA_SECRET_KEY}
  api-url: https://api.yookassa.ru/v3
  prepayment-amount: 500.00
  currency: RUB
  # URL, указанный в confirmation.return_url запроса к YooKassa.
  return-url: ${YOOKASSA_RETURN_URL}
  receipt:
    # Описание позиции в фискальном чеке (до 128 символов)
    item-description: "Оплата бронирования Moto Trip №%s"
    # Код ставки НДС: 1 — без НДС, 2 — 0%, 3 — 10%, 4 — 20%, 5 — 10/110, 6 — 20/120
    vat-code: ${YOOKASSA_RECEIPT_VAT_CODE:1}
    # Количество единиц товара/услуги (строка с 2–4 знаками после запятой)
    quantity: ${YOOKASSA_RECEIPT_QUANTITY:1.00}


logging:
  level:
    liquibase: INFO
    org.hibernate.SQL: WARN
    ge.tsepesh.motorental: INFO

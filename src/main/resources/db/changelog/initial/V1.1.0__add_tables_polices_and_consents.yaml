databaseChangeLog:
  - changeSet:
      id: 001-create-policies-table
      author: Vlad Tsepesh
      changes:
        - createTable:
            tableName: policies
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: text
                  type: varchar(10000)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
  - changeSet:
      id: 002-create-consents-table
      author: Vlad Tsepesh
      changes:
        - createTable:
            tableName: consents
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: policy_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: booking_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: hash
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: consents
            baseColumnNames: client_id
            constraintName: fk_consents_clients
            referencedTableName: clients
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: consents
            baseColumnNames: policy_id
            constraintName: fk_consents_policies
            referencedTableName: policies
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: consents
            baseColumnNames: booking_id
            constraintName: fk_consents_bookings
            referencedTableName: bookings
            referencedColumnNames: id
        - createIndex:
            indexName: idx_consents_client_policy
            tableName: consents
            columns:
              - column:
                  name: client_id
              - column:
                  name: policy_id
databaseChangeLog:
  - changeSet:
      id: 001-add-enabled-to-shifts
      author: Vlad Tsepesh
      changes:
        - addColumn:
            tableName: shifts
            columns:
              - column:
                  name: enabled
                  type: boolean
                  constraints:
                    nullable: true

        - update:
            tableName: shifts
            columns:
              - column:
                  name: enabled
                  valueBoolean: true
            where: enabled IS NULL

        - addNotNullConstraint:
            tableName: shifts
            columnName: enabled
            columnDataType: boolean
databaseChangeLog:
  - changeSet:
      id: 001-create-banners-table
      author: Vlad Tsepesh
      changes:
        - createTable:
            tableName: banners
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: route_id
                  type: int
                  constraints:
                    nullable: false
                    foreignKeyName: fk_banner_route
                    references: routes(id)
              - column:
                  name: ride_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: shift_id
                  type: int
                  constraints:
                    nullable: false
                    foreignKeyName: fk_banner_shift
                    references: shifts(id)
              - column:
                  name: title
                  type: varchar(255)
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: image_path
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp